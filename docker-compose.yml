# ================================================
# LangGraph 智能客服系统 — Docker Compose 编排
# 启动方式: docker-compose up -d
# ================================================
version: "3.8"  # Docker Compose 文件版本

services:
  # ── 后端服务 (FastAPI + LangGraph) ──
  backend:
    build:
      context: .           # 使用项目根目录的 Dockerfile
      dockerfile: Dockerfile
    container_name: cs-backend  # 容器名称，便于管理
    ports:
      - "${APP_PORT:-8000}:8000"  # 映射后端端口（从 .env 读取，默认 8000）
    env_file:
      - .env                # 加载环境变量（API Key 等）
    environment:
      - APP_HOST=0.0.0.0   # Docker 内必须绑定 0.0.0.0
    volumes:
      - ./data:/app/data           # 挂载知识库数据（可动态更新）
      - ./storage:/app/storage     # 持久化数据库和向量存储
    restart: unless-stopped        # 异常退出后自动重启
    networks:
      - cs-network                 # 自定义网络，与前端通信

  # ── 前端服务 (React + Vite) ──
  frontend:
    build:
      context: ./frontend   # 使用 frontend/ 目录的 Dockerfile
      dockerfile: Dockerfile
    container_name: cs-frontend  # 容器名称
    ports:
      - "3000:3000"          # 映射前端端口
    environment:
      - VITE_API_TARGET=http://backend:8000  # 代理到后端容器
    depends_on:
      - backend              # 等待后端先启动
    restart: unless-stopped  # 异常退出后自动重启
    networks:
      - cs-network           # 与后端共用网络

# ── 自定义网络 ──
networks:
  cs-network:
    driver: bridge  # 桥接网络，容器间可通过服务名互访
